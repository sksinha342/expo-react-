name: Expo EAS APK Build

on:
  push:
    branches:
      - main # Ya jo aapki branch ka naam ho

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🛠 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Clean and Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          # Pehle package.json se agar koi galat version lock hai to use sahi karenge
          npm install expo@54.0.35 --legacy-peer-deps
          
          # Expo ko bolenge ki wo dependencies ko sahi (deduplicate) kare
          npx expo install --fix
          
          # Forcefully galat expo-font ko hatakar sahi version lock karenge
          npm install expo-font@14.0.12 --save-exact --legacy-peer-deps
      - name: 🩺 Run Expo Doctor
        run: npx expo-doctor

      - name: 🚀 Build Android Preview APK
        run: eas build --platform android --profile preview --non-interactive